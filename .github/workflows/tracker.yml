name: Flight Tracker Cron Job

on:
  schedule:
    # 這裡使用 Cron 語法，例如每 6 小時執行一次 (UTC 時間)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # 允許手動點擊執行並輸入參數
    inputs:
      fly_from:
        description: '出發機場 (例如 TPE，留空則讀取 GitHub Variables)'
        required: false
        default: ''
      fly_to:
        description: '目的地機場 (例如 DAD，留空則讀取 GitHub Variables)'
        required: false
        default: ''
      search_mode:
        description: '搜尋模式 (range 或 single，留空則讀取 GitHub Variables)'
        required: false
        default: ''
      range_start:
        description: '區間開始日期 (YYYY-MM-DD，留空則讀取 GitHub Variables)'
        required: false
        default: ''
      range_end:
        description: '區間結束日期 (YYYY-MM-DD，留空則讀取 GitHub Variables)'
        required: false
        default: ''
      travel_duration:
        description: '旅遊天數 (留空則讀取 GitHub Variables)'
        required: false
        default: ''
      top_n_results:
        description: '回傳前幾便宜的組合 (留空則讀取 GitHub Variables)'
        required: false
        default: ''
      price_threshold:
        description: 'LINE 通知價格門檻 (留空則讀取 GitHub Variables)'
        required: false
        default: ''

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保 Github Actions 有權限能 commit & push 歷史票價資料庫

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Script
      env:
        # 敏感金鑰 (須設定在 GitHub Repository Secrets 中)
        API_KEY: ${{ secrets.API_KEY }}
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        
        # 航班與搜尋設定 (優先級：手動輸入值 > GitHub Variables 環境變數 > 程式預設值)
        FLY_FROM: ${{ github.event.inputs.fly_from || vars.FLY_FROM || 'TPE' }}
        FLY_TO: ${{ github.event.inputs.fly_to || vars.FLY_TO || 'DAD' }}
        SEARCH_MODE: ${{ github.event.inputs.search_mode || vars.SEARCH_MODE || 'range' }}
        RANGE_START: ${{ github.event.inputs.range_start || vars.RANGE_START || '2026-10-03' }}
        RANGE_END: ${{ github.event.inputs.range_end || vars.RANGE_END || '2026-10-09' }}
        TRAVEL_DURATION: ${{ github.event.inputs.travel_duration || vars.TRAVEL_DURATION || '5' }}
        TOP_N_RESULTS: ${{ github.event.inputs.top_n_results || vars.TOP_N_RESULTS || '3' }}
        PRICE_THRESHOLD: ${{ github.event.inputs.price_threshold || vars.PRICE_THRESHOLD || '8000' }}
      run: python flight_tracker.py

    - name: Commit and Push DB Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f flights_history.db
        # 只有在資料庫有更新時才 commit，避免報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update price history DB" && git push)
